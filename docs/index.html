<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM String Builder</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg:        #07070f;
        --bg-s:      #0e0e1c;
        --bg-r:      #141428;
        --border:    rgba(255,255,255,0.06);
        --border-h:  rgba(255,255,255,0.12);
        --text-1:    #e2e8f0;
        --text-2:    #94a3b8;
        --text-3:    #4a5568;
        --c-proto:   #4a5568;
        --c-sep:     #374151;
        --c-id:      #22d3ee;
        --c-key:     #f87171;
        --c-host:    #818cf8;
        --c-model:   #34d399;
        --c-pk:      #c084fc;
        --c-pv:      #fbbf24;
        --accent:    #6366f1;
        --ok:        #34d399;
        --warn:      #fbbf24;
        --err:       #f87171;
      }

      html, body {
        height: 100%;
        font-family: "Lexend", sans-serif;
        background: var(--bg);
        color: var(--text-1);
        -webkit-font-smoothing: antialiased;
      }
      body {
        background:
          radial-gradient(ellipse at 50% -10%, rgba(99,102,241,.09) 0%, transparent 55%),
          radial-gradient(ellipse at 80%  70%, rgba(52,211,153,.04) 0%, transparent 40%),
          var(--bg);
      }

      /* ── Stage ── */
      .stage {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 24px 60px;
        gap: 0;
      }

      /* ── Wordmark ── */
      .wordmark {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 4px;
        text-transform: uppercase;
        background: linear-gradient(120deg, #818cf8, #34d399);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 52px;
        opacity: 0.8;
      }

      /* ── URL area ── */
      .url-area {
        width: 100%;
        max-width: 920px;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
      }

      /* ── URL display ── */
      .url-display {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: center;
        font-family: "JetBrains Mono", monospace;
        font-size: clamp(17px, 2.6vw, 24px);
        line-height: 1.9;
        padding: 16px 8px 12px;
        cursor: default;
        user-select: none;
        outline: none;
        width: 100%;
      }

      .u-proto { color: var(--c-proto); }
      .u-sep   { color: var(--c-sep);   user-select: none; }

      /* clickable segment base */
      .u-seg {
        cursor: pointer;
        border-radius: 6px;
        padding: 1px 5px;
        margin: 0 -1px;
        transition: background .15s, box-shadow .15s;
        position: relative;
      }
      .u-seg:hover        { background: rgba(255,255,255,.05); }
      .u-seg.act          { box-shadow: 0 0 0 1.5px currentColor; }

      /* per-segment colors */
      .u-host  { color: var(--c-host);  }
      .u-host.act  { background: rgba(129,140,248,.12); }
      .u-model { color: var(--c-model); }
      .u-model.act { background: rgba(52,211,153,.12);  }
      .u-id    { color: var(--c-id);   }
      .u-id.act { background: rgba(34,211,238,.1); }
      .u-apikey { color: var(--c-key); }
      .u-pk    { color: var(--c-pk);   }
      .u-pv    { color: var(--c-pv);   }

      /* param segment wrapper */
      .u-param { cursor: pointer; border-radius: 6px; padding: 1px 5px; margin: 0 -1px; transition: background .15s, box-shadow .15s; }
      .u-param:hover { background: rgba(192,132,252,.07); }
      .u-param.act   { box-shadow: 0 0 0 1.5px var(--c-pk); background: rgba(192,132,252,.1); }
      .u-param.err .u-pk,
      .u-param.err .u-pv { color: var(--err); }

      /* placeholder */
      .u-ph {
        color: var(--text-3);
        font-style: italic;
        cursor: pointer;
        border-radius: 6px;
        padding: 1px 5px;
        margin: 0 -1px;
        transition: color .15s, background .15s, box-shadow .15s;
        border-bottom: 1px dashed rgba(255,255,255,.1);
      }
      .u-ph:hover { color: var(--text-2); background: rgba(255,255,255,.04); }
      .u-ph.act   { box-shadow: 0 0 0 1.5px currentColor; }
      .u-ph.host-ph  { color: rgba(129,140,248,.5); }
      .u-ph.host-ph:hover { color: var(--c-host); }
      .u-ph.host-ph.act { color: var(--c-host); background: rgba(129,140,248,.1); }
      .u-ph.model-ph { color: rgba(52,211,153,.45); }
      .u-ph.model-ph:hover { color: var(--c-model); }
      .u-ph.model-ph.act { color: var(--c-model); background: rgba(52,211,153,.1); }

      /* identity add affordance */
      .u-id-add {
        cursor: pointer;
        color: rgba(34,211,238,.3);
        font-style: normal;
        border-radius: 5px;
        padding: 1px 4px;
        margin: 0 2px 0 -1px;
        font-size: .78em;
        transition: all .15s;
        border: 1px dashed rgba(34,211,238,.15);
      }
      .u-id-add:hover { color: var(--c-id); border-color: rgba(34,211,238,.4); background: rgba(34,211,238,.07); }
      .u-id-add.act   { color: var(--c-id); background: rgba(34,211,238,.1); border-color: rgba(34,211,238,.4); box-shadow: 0 0 0 1px var(--c-id); }

      /* add-param affordance */
      .u-addp {
        cursor: pointer;
        color: rgba(192,132,252,.35);
        border-radius: 5px;
        padding: 1px 7px;
        margin-left: 2px;
        font-size: .78em;
        transition: all .15s;
        border: 1px dashed rgba(192,132,252,.15);
      }
      .u-addp:hover { color: var(--c-pk); border-color: rgba(192,132,252,.4); background: rgba(192,132,252,.07); }
      .u-addp.act   { color: var(--c-pk); background: rgba(192,132,252,.1); border-color: rgba(192,132,252,.4); box-shadow: 0 0 0 1px var(--c-pk); }

      /* ── Raw edit mode ── */
      .url-raw-wrap {
        width: 100%;
        display: flex;
        justify-content: center;
        padding: 10px 8px 4px;
      }
      .url-raw-input {
        width: 100%;
        max-width: 100%;
        background: transparent;
        border: none;
        border-bottom: 2px solid rgba(99,102,241,.5);
        outline: none;
        font-family: "JetBrains Mono", monospace;
        font-size: clamp(17px, 2.6vw, 24px);
        color: var(--text-1);
        text-align: center;
        padding: 6px 4px 10px;
        transition: border-color .2s;
        caret-color: var(--accent);
      }
      .url-raw-input.ok  { border-bottom-color: rgba(52,211,153,.6); }
      .url-raw-input.bad { border-bottom-color: rgba(248,113,113,.7); color: var(--err); }
      .url-raw-input::placeholder { color: var(--text-3); font-style: italic; }
      .url-raw-hint {
        font-size: 11px;
        color: var(--text-3);
        margin-top: 6px;
        text-align: center;
        font-family: "Lexend", sans-serif;
        letter-spacing: .3px;
      }

      /* ── Editor panel ── */
      .editor-panel {
        width: 100%;
        max-width: 860px;
        margin-top: 6px;
        animation: panelIn .18s ease-out;
      }
      @keyframes panelIn {
        from { opacity: 0; transform: translateY(-8px) scale(.99); }
        to   { opacity: 1; transform: none; }
      }
      .ep-card {
        background: rgba(255,255,255,.022);
        border: 1px solid var(--border-h);
        border-radius: 16px;
        padding: 20px 22px;
      }

      /* Provider grid in panel */
      .ep-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-bottom: 14px;
      }
      .ep-tile {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        padding: 10px 6px 9px;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: rgba(255,255,255,.012);
        cursor: pointer;
        font-family: "Lexend", sans-serif;
        transition: all .18s ease;
      }
      .ep-tile:hover { border-color: var(--border-h); background: rgba(255,255,255,.04); transform: translateY(-1px); }
      .ep-tile.sel   { transform: translateY(-1px); }
      .ep-tile-name  { font-size: 10px; font-weight: 600; color: var(--text-3); letter-spacing: .3px; }
      .ep-tile.sel .ep-tile-name { color: var(--text-1); }
      .ep-tile-icon  { transition: transform .18s; }
      .ep-tile.sel .ep-tile-icon { transform: scale(1.1); }
      .provider-logo { display: block; object-fit: contain; }

      .brand-fineprint {
        width: min(860px, calc(100% - 48px));
        margin: -30px auto 34px;
        color: var(--text-3);
        font-size: 10px;
        line-height: 1.55;
        text-align: center;
      }
      .brand-fineprint a { color: var(--text-2); text-decoration-color: rgba(148,163,184,.35); }

      .ep-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

      /* Inputs in panels */
      .ep-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .7px;
        color: var(--text-3);
        margin-bottom: 6px;
        display: block;
      }
      .ep-input {
        width: 100%;
        padding: 9px 12px;
        background: rgba(255,255,255,.045);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text-1);
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        outline: none;
        transition: border-color .2s, box-shadow .2s;
        caret-color: var(--accent);
      }
      .ep-input:focus { border-color: rgba(99,102,241,.5); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
      .ep-input::placeholder { color: var(--text-3); }

      /* Model list */
      .ep-model-list {
        max-height: 180px;
        overflow-y: auto;
        margin-top: 8px;
      }
      .ep-model-list::-webkit-scrollbar { width: 4px; }
      .ep-model-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }
      .ep-model-item {
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        color: var(--text-2);
        transition: all .1s;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .ep-model-item:hover  { background: rgba(52,211,153,.08); color: var(--c-model); }
      .ep-model-item.cur    { color: var(--c-model); background: rgba(52,211,153,.08); }
      .ep-model-item .cur-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--c-model); flex-shrink: 0; }

      /* Param edit */
      .ep-param-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 16px;
        gap: 12px;
      }
      .ep-param-title { font-family: "JetBrains Mono", monospace; font-size: 17px; font-weight: 600; color: var(--c-pk); }
      .ep-param-desc  { font-size: 12px; color: var(--text-3); margin-top: 3px; }
      .ep-remove {
        padding: 5px 13px;
        border-radius: 8px;
        background: rgba(248,113,113,.08);
        border: 1px solid rgba(248,113,113,.14);
        color: var(--err);
        font-family: "Lexend", sans-serif;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        transition: all .15s;
        flex-shrink: 0;
      }
      .ep-remove:hover { background: rgba(248,113,113,.14); border-color: rgba(248,113,113,.3); }

      /* Slider + number */
      .slider-row { display: flex; align-items: center; gap: 12px; }
      .slider-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
      .slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        background: rgba(255,255,255,.1);
        border-radius: 2px;
        outline: none;
      }
      .slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px; height: 18px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        border: 2px solid #0e0e1c;
        box-shadow: 0 0 8px rgba(99,102,241,.4);
      }
      .slider-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--text-3); font-family: "JetBrains Mono", monospace; }
      .num-box {
        width: 80px;
        text-align: center;
        padding: 7px 10px;
        background: rgba(255,255,255,.045);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text-1);
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        outline: none;
        -moz-appearance: textfield;
        transition: border-color .2s;
      }
      .num-box:focus { border-color: rgba(99,102,241,.5); }
      .num-box::-webkit-inner-spin-button,
      .num-box::-webkit-outer-spin-button { -webkit-appearance: none; }

      /* Toggle */
      .toggle-btn {
        width: 48px; height: 26px;
        border-radius: 13px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,.05);
        position: relative;
        cursor: pointer;
        transition: all .22s;
        flex-shrink: 0;
      }
      .toggle-btn.on { background: rgba(52,211,153,.2); border-color: rgba(52,211,153,.4); }
      .toggle-thumb {
        position: absolute;
        top: 3px; left: 3px;
        width: 18px; height: 18px;
        border-radius: 50%;
        background: var(--text-3);
        transition: all .22s;
      }
      .toggle-btn.on .toggle-thumb { transform: translateX(22px); background: var(--ok); }

      /* Enum select */
      .ep-select {
        width: 100%;
        padding: 9px 12px;
        background: rgba(255,255,255,.045);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text-1);
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        outline: none;
        appearance: none;
        cursor: pointer;
        background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 4l4 4 4-4' fill='none' stroke='%234a5568' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 12px center;
        padding-right: 32px;
      }
      .ep-select:focus { border-color: rgba(99,102,241,.5); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }

      /* Ghost chips */
      .ghost-chips { display: flex; flex-wrap: wrap; gap: 6px; }
      .ghost-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 10px 5px 6px;
        border: 1px dashed rgba(255,255,255,.09);
        border-radius: 8px;
        background: transparent;
        cursor: pointer;
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
        color: var(--text-3);
        transition: all .16s;
      }
      .ghost-chip:hover { border-color: rgba(192,132,252,.35); border-style: solid; color: var(--c-pk); background: rgba(192,132,252,.07); transform: translateY(-1px); }
      .ghost-chip-plus {
        width: 14px; height: 14px;
        border-radius: 50%;
        border: 1.2px solid currentColor;
        display: flex; align-items: center; justify-content: center;
        opacity: .6;
        flex-shrink: 0;
        transition: all .15s;
      }
      .ghost-chip:hover .ghost-chip-plus { opacity: 1; background: var(--c-pk); border-color: var(--c-pk); color: #07070f; }
      .ghost-chip-def { opacity: .32; font-size: 10px; }

      /* ── Info bar ── */
      .info-bar {
        width: 100%;
        max-width: 860px;
        margin-top: 18px;
        padding: 14px 16px;
        border-top: 1px solid rgba(255,255,255,.04);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .info-parts {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        justify-content: center;
        align-items: center;
      }
      .info-dot { color: var(--text-3); font-size: 10px; }
      .info-item {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        border-radius: 20px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: all .15s;
      }
      .info-item:hover { background: rgba(255,255,255,.04); border-color: var(--border); }
      .info-item.active { background: rgba(99,102,241,.07); border-color: rgba(99,102,241,.2); }
      .info-lbl {
        font-size: 9.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .6px;
        color: var(--text-3);
      }
      .info-val {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--text-2);
      }
      .info-val.empty { color: var(--text-3); font-style: italic; }
      .info-val.host-val  { color: var(--c-host); }
      .info-val.model-val { color: var(--c-model); }
      .info-val.id-val    { color: var(--c-id); }
      .info-val.key-val   { color: var(--c-key); }
      .info-val.pk-val    { color: var(--c-pk); }

      /* validation issues */
      .info-issues { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
      .issue-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        border-radius: 8px;
        font-size: 11.5px;
        font-family: "Lexend", sans-serif;
        font-weight: 500;
      }
      .issue-pill.err  { background: rgba(248,113,113,.1); color: var(--err); border: 1px solid rgba(248,113,113,.15); }
      .issue-pill.warn { background: rgba(251,191,36,.1);  color: var(--warn); border: 1px solid rgba(251,191,36,.15); }

      /* ── Identity panel two-col ── */
      .ep-two { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

      /* ── Two-col layout helper ── */
      .ep-row { display: flex; align-items: center; gap: 10px; }

      /* ── Copy button ── */
      .copy-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        margin-top: 14px;
        padding: 8px 20px;
        border-radius: 10px;
        border: 1px solid rgba(99,102,241,.3);
        background: rgba(99,102,241,.1);
        color: #a5b4fc;
        font-family: "Lexend", sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: .3px;
        cursor: pointer;
        transition: all .18s ease;
      }
      .copy-btn:hover {
        border-color: rgba(99,102,241,.6);
        background: rgba(99,102,241,.18);
        color: #c7d2fe;
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(99,102,241,.18);
      }
      .copy-btn.copied {
        border-color: rgba(52,211,153,.5);
        background: rgba(52,211,153,.12);
        color: #6ee7b7;
      }
      .reset-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 8px;
        border: 1px solid rgba(248,113,113,.2);
        background: transparent;
        color: rgba(248,113,113,.5);
        font-family: "Lexend", sans-serif;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all .18s ease;
      }
      .reset-btn:hover {
        border-color: rgba(248,113,113,.5);
        background: rgba(248,113,113,.08);
        color: var(--err);
      }

      /* ── Responsive ── */
      @media (max-width: 560px) {
        .ep-grid { grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .ep-tile { padding: 8px 3px 7px; }
        .ep-tile-name { font-size: 9px; }
        .ep-two { grid-template-columns: 1fr; }
        .stage { padding: 36px 14px 40px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useState, useEffect, useMemo, useRef, useCallback } = React;

      // ══════════════════════════════════════════════
      // DATA
      // ══════════════════════════════════════════════

      const PROVIDERS = [
        { id:"openai",     name:"OpenAI",     host:"api.openai.com",                          color:"#10a37f" },
        { id:"anthropic",  name:"Anthropic",  host:"api.anthropic.com",                       color:"#e8956a" },
        { id:"google",     name:"Google",     host:"generativelanguage.googleapis.com",        color:"#4285f4" },
        { id:"mistral",    name:"Mistral",    host:"api.mistral.ai",                          color:"#ff7000" },
        { id:"cohere",     name:"Cohere",     host:"api.cohere.com",                          color:"#39d4a5" },
        { id:"bedrock",    name:"Bedrock",    host:"bedrock-runtime.us-east-1.amazonaws.com", color:"#ff9900" },
        { id:"openrouter", name:"OpenRouter", host:"openrouter.ai",                           color:"#818cf8" },
        { id:"vercel",     name:"Vercel",     host:"gateway.ai.vercel.app",                   color:"#a0a0b0" },
        { id:"meta",       name:"Meta",       host:"api.meta.ai",                             color:"#0866ff" },

      const MODELS = {

      function hexToRgba(hex, a) {
        hex = hex.replace("#","");
        if (hex.length === 3) hex = hex.split("").map(c=>c+c).join("");
        return `rgba(${parseInt(hex.slice(0,2),16)},${parseInt(hex.slice(2,4),16)},${parseInt(hex.slice(4,6),16)},${a})`;
      }

      function detectProvider(host) {
        if (!host) return null;
        const h = host.toLowerCase();
        if (h.includes("openrouter")) return "openrouter";
        if (h.includes("gateway.ai.vercel")) return "vercel";
        if (h.includes("amazonaws") || h.includes("bedrock")) return "bedrock";
        if (h.includes("meta.ai")) return "meta";
        if (h.includes("openai")) return "openai";
        if (h.includes("anthropic") || h.includes("claude")) return "anthropic";
        if (h.includes("googleapis") || h.includes("google")) return "google";
        if (h.includes("mistral")) return "mistral";
        if (h.includes("cohere")) return "cohere";
        return null;
      }

      function buildUrl(label, apiKey, host, model, params) {
        let s = "llm://";
        if (label) {
          s += encodeURIComponent(label);
          if (apiKey) s += ":" + encodeURIComponent(apiKey);
          s += "@";
        }
        s += host || "provider";
        s += "/" + (model || "model");
        const qs = Object.entries(params).filter(([,v]) => v !== "" && v !== undefined && v !== null);
        if (qs.length) s += "?" + qs.map(([k,v]) => `${k}=${encodeURIComponent(String(v))}`).join("&");
        return s;
      }

      function parseUrl(text) {
        try {
          const u = new URL(text.trim());
          if (u.protocol !== "llm:") return null;
          const host = u.hostname + (u.port ? ":" + u.port : "");
          const model = decodeURIComponent(u.pathname.replace(/^\//, ""));
          const label = decodeURIComponent(u.username || "");
          const apiKey = decodeURIComponent(u.password || "");
          const params = {};
          u.searchParams.forEach((v, k) => { params[k] = v; });
          return { host, model, label, apiKey, params };
        } catch { return null; }
      }

      function isReasoningModel(model) {
        return /^o[134]/.test((model||"").replace(/^.*\//,""));
      }

      function validateConfig(provider, model, params) {
        const issues = [];
        const specs = PARAM_SPECS[provider] || {};
        for (const [name, value] of Object.entries(params)) {
          const spec = specs[name];
          if (!spec) { issues.push({ param:name, severity:"warning", msg:"Unknown parameter for this provider" }); continue; }
          if (spec.type === "number") {
            const str = String(value).trim();
            if (str === "") continue;
            const num = parseFloat(str);
            if (isNaN(num)) { issues.push({ param:name, severity:"error", msg:"Must be a valid number" }); }
            else {
              if (spec.min !== undefined && num < spec.min) issues.push({ param:name, severity:"error", msg:`Min value is ${spec.min}` });
              if (spec.max !== undefined && num > spec.max) issues.push({ param:name, severity:"error", msg:`Max value is ${spec.max}` });
            }
          }
          if (spec.type === "enum" && spec.values && value !== "" && !spec.values.includes(String(value)))
            issues.push({ param:name, severity:"error", msg:`Must be one of: ${spec.values.join(", ")}` });
        }
        if ((provider === "anthropic" || provider === "bedrock") && params.temperature !== undefined && params.top_p !== undefined)
          issues.push({ param:"top_p", severity:"warning", msg:"Cannot combine temperature and top_p" });
        if (model && isReasoningModel(model) && ["openai","openrouter","vercel"].includes(provider))
          for (const p of ["temperature","top_p","frequency_penalty","presence_penalty","n"])
            if (params[p] !== undefined)
              issues.push({ param:p, severity:"error", msg:`Not supported for reasoning model — use effort instead` });
        return issues;
      }

      function RawInput({ initial, onCommit, onCancel }) {
        const [text, setText] = useState(initial);
        const parsed = useMemo(() => parseUrl(text), [text]);
        const hasInput = text.trim().length > 0;
        const cls = hasInput ? (parsed ? "ok" : "bad") : "";

        return (
          <div style={{ width:"100%" }}>
            <div className="url-raw-wrap">
              <input
                className={`url-raw-input ${cls}`}
                value={text}
                onChange={e => setText(e.target.value)}
                onBlur={() => { if (parsed) onCommit(parsed); else if (!text.trim()) onCancel(); }}
                onKeyDown={e => {
                  if (e.key === "Enter") { if (parsed) onCommit(parsed); }
                  if (e.key === "Escape") onCancel();
                }}
                autoFocus
                spellCheck={false}
                placeholder="llm://host/model?params…"
              />
            </div>
            <div className="url-raw-hint">
              {hasInput && !parsed ? "⚠ invalid llm:// URL" : parsed ? "↵ to apply · Esc to cancel" : "Esc to cancel"}
            </div>
          </div>
        );
      }

      function ParamEditPanel({ name, spec, value, onChange, onRemove, issue }) {
        let control;
        const hasRange = spec.type === "number" && spec.min !== undefined && spec.max !== undefined;
        const step = hasRange && spec.max - spec.min <= 4 ? 0.01 : 1;

        switch(spec.type) {
          case "number":
            control = (
              <div className="slider-row">
                {hasRange && (
                  <div className="slider-wrap">
                    <input type="range" className="slider"
                      min={spec.min} max={spec.max} step={step}
                      value={value === "" ? spec.min : value}
                      onChange={e => onChange(parseFloat(e.target.value))}
                    />
                    <div className="slider-labels"><span>{spec.min}</span><span>{spec.max}</span></div>
                  </div>
                )}
                <input type="number" className="num-box"
                  min={spec.min} max={spec.max} step={step} value={value}
                  onChange={e => onChange(e.target.value)}
                  style={{width: hasRange ? 80 : 120}}
                />
              </div>
            );
            break;
          case "boolean":
            const on = value === true || value === "true";
            control = (
              <button type="button" className={`toggle-btn${on ? " on" : ""}`} onClick={() => onChange(!on)}>
                <span className="toggle-thumb"/>
              </button>
            );
            break;
          case "enum":
            control = (
              <select className="ep-select" value={value} onChange={e => onChange(e.target.value)}>
                {(spec.values||[]).map(v => <option key={v} value={v}>{v}</option>)}
              </select>
            );
            break;
          default:
            control = (
              <input className="ep-input" type="text" value={value}
                onChange={e => onChange(e.target.value)}
                placeholder="value"
                autoFocus
              />
            );
        }

        return (
          <div className="ep-card">
            <div className="ep-param-head">
              <div>
                <div className="ep-param-title">{name}</div>
                {spec.desc && <div className="ep-param-desc">{spec.desc}</div>}
                {issue && (
                  <div style={{marginTop:4, fontSize:12, color: issue.severity === "error" ? "var(--err)" : "var(--warn)"}}>
                    {issue.severity === "error" ? "✕" : "⚠"} {issue.msg}
                  </div>
                )}
              </div>
              <button className="ep-remove" onClick={onRemove}>Remove</button>
            </div>
            {control}
          </div>
        );
      }

      function AddParamPanel({ specs, activeNames, onAdd }) {
        const available = Object.keys(specs).filter(k => !activeNames.includes(k));
        if (available.length === 0) return (
          <div className="ep-card" style={{textAlign:"center",color:"var(--text-3)",fontSize:13}}>
            All available parameters are active
          </div>
        );
        return (
          <div className="ep-card">
            <div className="ep-label" style={{marginBottom:10}}>Available parameters — click to activate</div>
            <div className="ghost-chips">
              {available.map(name => {
                const spec = specs[name];
                const showDef = spec.def !== undefined && spec.def !== "" && spec.def !== false;
                return (
                  <button key={name} type="button" className="ghost-chip" onClick={() => onAdd(name, spec.def)} title={spec.desc}>
                    <span className="ghost-chip-plus">
                      <svg width="7" height="7" viewBox="0 0 7 7">
                        <path d="M3.5 1v5M1 3.5h5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
                      </svg>
                    </span>
                    <span>{name}</span>
                    {showDef && <span className="ghost-chip-def">{String(spec.def)}</span>}
                  </button>
                );
              })}
            </div>
          </div>
        );
      }

      // ══════════════════════════════════════════════
      // INFO BAR
      // ══════════════════════════════════════════════

      function InfoBar({ label, apiKey, host, model, params, providerMeta, issues, active, onActivate }) {
        const errs  = issues.filter(i => i.severity === "error").length;
        const warns = issues.filter(i => i.severity === "warning").length;
        const isValid = host && model && errs === 0 && warns === 0;

        function Item({ id, lbl, val, valClass, empty }) {
          return (
            <span
              className={`info-item${active === id ? " active" : ""}`}
              onClick={() => onActivate(active === id ? null : id)}
              title={`Click to ${active === id ? "close" : "edit"} ${lbl.toLowerCase()}`}
            >
              <span className="info-lbl">{lbl}</span>
              <span className={`info-val${empty ? " empty" : ""}${valClass ? " "+valClass : ""}`}>{val}</span>
            </span>
          );
        }

        return (
          <div className="info-bar">
            <div className="info-parts">
              <Item id="identity" lbl="App"      val={label  || "—"} valClass={label  ? "id-val"    : ""} empty={!label}/>
              <span className="info-dot">·</span>
              <Item id="identity" lbl="Key"      val={apiKey ? "sk-••••" : "—"} valClass={apiKey ? "key-val" : ""} empty={!apiKey}/>
              <span className="info-dot">·</span>
              <Item id="host"     lbl="Provider" val={providerMeta ? providerMeta.name : host || "—"} valClass={host ? "host-val" : ""} empty={!host}/>
              <span className="info-dot">·</span>
              <Item id="model"    lbl="Model"    val={model  || "—"} valClass={model  ? "model-val" : ""} empty={!model}/>
              {Object.entries(params).map(([k, v]) => (
                <React.Fragment key={k}>
                  <span className="info-dot">·</span>
                  <Item id={k} lbl={k} val={String(v)} valClass="pk-val"/>
                </React.Fragment>
              ))}
              {isValid && (
                <>
                  <span className="info-dot">·</span>
                  <span style={{fontSize:12, color:"var(--ok)", padding:"4px 8px"}}>✓ valid</span>
                </>
              )}
            </div>

            {issues.length > 0 && (
              <div className="info-issues">
                {issues.map((iss, i) => (
                  <span key={i} className={`issue-pill ${iss.severity === "error" ? "err" : "warn"}`}>
                    {iss.severity === "error" ? "✕" : "⚠"} {iss.param}: {iss.msg}
                  </span>
                ))}
              </div>
            )}
          </div>
        );
      }

      // ══════════════════════════════════════════════
      // APP
      // ══════════════════════════════════════════════

      const STORAGE_KEY = "llm-strings-playground";

      function loadSaved() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch { return null; }
      }

      function App() {
        const saved = useMemo(() => loadSaved(), []);
        const [label,     setLabel]     = useState(saved?.label   ?? "");
        const [apiKey,    setApiKey]    = useState(saved?.apiKey  ?? "");
        const [host,      setHost]      = useState(saved?.host    ?? "");
        const [model,     setModel]     = useState(saved?.model   ?? "");
        const [params,    setParams]    = useState(saved?.params  ?? {});
        const [active,    setActive]    = useState(null);
        const [rawMode,   setRawMode]   = useState(false);
        const [showKey,   setShowKey]   = useState(false);
        const [copied,    setCopied]    = useState(false);

        useEffect(() => {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ label, apiKey, host, model, params }));
          } catch {}
        }, [label, apiKey, host, model, params]);

        function handleReset() {
          setLabel(""); setApiKey(""); setHost(""); setModel(""); setParams({});
          setActive(null); setRawMode(false);
          localStorage.removeItem(STORAGE_KEY);
        }

        const provider     = detectProvider(host);
        const providerMeta = PROVIDERS.find(p => p.id === provider);
        const specs        = PARAM_SPECS[provider] || {};

        const issues  = useMemo(() => validateConfig(provider, model, params), [provider, model, params]);
        const issueMap = useMemo(() => { const m = {}; issues.forEach(i => { if (!m[i.param]) m[i.param] = i; }); return m; }, [issues]);
        const issueParams = useMemo(() => new Set(issues.map(i => i.param)), [issues]);

        const plain = useMemo(() => buildUrl(label, apiKey, host, model, params), [label, apiKey, host, model, params]);

        // Close panel on click outside
        const stageRef = useRef(null);
        const panelRef = useRef(null);
        const urlRef   = useRef(null);

        useEffect(() => {
          function handle(e) {
            if (rawMode) return;
            const inPanel = panelRef.current?.contains(e.target);
            const inUrl   = urlRef.current?.contains(e.target);
            if (!inPanel && !inUrl) setActive(null);
          }
          document.addEventListener("mousedown", handle);
          return () => document.removeEventListener("mousedown", handle);
        }, [rawMode]);

        function handleActivate(id) {
          if (id === active) { setActive(null); return; }
          setActive(id);
        }

        function handleSelectProvider(id) {
          const p = PROVIDERS.find(x => x.id === id);
          if (!p) return;
          setHost(p.host);
          setModel("");
          setParams(prev => {
            const ns = PARAM_SPECS[p.id] || {};
            const keep = {};
            for (const [k, v] of Object.entries(prev)) if (ns[k]) keep[k] = v;
            return keep;
          });
          setActive("model"); // auto-advance to model picker
        }

        function handleSetHost(h) {
          setHost(h);
          setModel("");
          setActive("model");
        }

        function handleSelectModel(m) {
          setModel(m);
          setActive(null);
        }

        function handleAddParam(name, def) {
          setParams(p => ({ ...p, [name]: def }));
          setActive(name); // open param edit immediately
        }

        function handleRemoveParam(name) {
          setParams(p => { const c = {...p}; delete c[name]; return c; });
          setActive(null);
        }

        function handleCopy() {
          navigator.clipboard.writeText(plain).then(() => {
            setCopied(true);
            setTimeout(() => setCopied(false), 1800);
          });
        }

        function handleRawCommit(parsed) {
          setHost(parsed.host || "");
          setModel(parsed.model || "");
          setLabel(parsed.label || "");
          setApiKey(parsed.apiKey || "");
          setParams(parsed.params || {});
          setRawMode(false);
          setActive(null);
        }

        // Determine which panel to show
        const isParamPanel = active && params[active] !== undefined;

        return (
          <>
          <div className="stage" ref={stageRef}>
            <div className="wordmark">LLM Strings</div>

            <div className="url-area" ref={urlRef}>
              {rawMode ? (
                <RawInput
                  initial={plain}
                  onCommit={handleRawCommit}
                  onCancel={() => setRawMode(false)}
                />
              ) : (
                <UrlDisplay
                  label={label}
                  apiKey={apiKey}
                  showKeyPlain={showKey}
                  host={host}
                  model={model}
                  params={params}
                  active={active}
                  onActivate={handleActivate}
                  onKeyPress={() => { setActive(null); setRawMode(true); }}
                  issueParams={issueParams}
                />
              )}

              {!rawMode && (
                <div style={{display:"flex", alignItems:"center", gap:10, marginTop:14}}>
                  <button
                    className={`copy-btn${copied ? " copied" : ""}`}
                    style={{marginTop:0}}
                    onClick={handleCopy}
                    title="Copy LLM string to clipboard"
                  >
                    {copied ? (
                      <>
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                          <path d="M2 7l3.5 3.5L12 3.5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                        Copied!
                      </>
                    ) : (
                      <>
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                          <rect x="4.5" y="1" width="8" height="9.5" rx="1.5" stroke="currentColor" strokeWidth="1.4"/>
                          <path d="M1 4.5v7.5A1.5 1.5 0 0 0 2.5 13.5H10" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
                        </svg>
                        Copy
                      </>
                    )}
                  </button>
                  {(host || model || label || apiKey || Object.keys(params).length > 0) && (
                    <button className="reset-btn" onClick={handleReset} title="Clear all fields">
                      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                        <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/>
                      </svg>
                      Reset
                    </button>
                  )}
                </div>
              )}
            </div>

            {/* Editor panel */}
            {!rawMode && active && (
              <div className="editor-panel" ref={panelRef}>
                {active === "host" && (
                  <HostPanel
                    currentProvider={provider}
                    host={host}
                    onSelectProvider={handleSelectProvider}
                    onSetHost={handleSetHost}
                  />
                )}
                {active === "model" && (
                  <ModelPanel
                    model={model}
                    provider={provider}
                    onSelect={handleSelectModel}
                  />
                )}
                {active === "identity" && (
                  <IdentityPanel
                    label={label}
                    apiKey={apiKey}
                    showKeyPlain={showKey}
                    onSetLabel={setLabel}
                    onSetApiKey={setApiKey}
                    onToggleKey={() => setShowKey(x => !x)}
                  />
                )}
                {active === "addParam" && (
                  <AddParamPanel
                    specs={specs}
                    activeNames={Object.keys(params)}
                    onAdd={handleAddParam}
                  />
                )}
                {isParamPanel && (
                  <ParamEditPanel
                    name={active}
                    spec={specs[active] || { type:"string", def:"" }}
                    value={params[active]}
                    onChange={v => setParams(p => ({ ...p, [active]: v }))}
                    onRemove={() => handleRemoveParam(active)}
                    issue={issueMap[active]}
                  />
                )}
              </div>
            )}

            {/* Info bar */}
            <InfoBar
              label={label}
              apiKey={apiKey}
              host={host}
              model={model}
              params={params}
              providerMeta={providerMeta}
              issues={issues}
              active={active}
              onActivate={handleActivate}
            />
          </div>
          <p className="brand-fineprint">
            Provider logos are the property of their respective owners and are used here solely to identify compatible services. LLM Strings is not affiliated with, endorsed by, or sponsored by OpenAI, Anthropic, Google, Mistral AI, Cohere, Amazon Web Services, OpenRouter, Vercel, Meta, or DeepSeek. Marks remain subject to their owners’ brand guidelines. SVG sources: official provider sites and <a href="https://simpleicons.org/" target="_blank" rel="noreferrer">Simple Icons</a> (CC0).
          </p>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
    </script>
  </body>
</html>
