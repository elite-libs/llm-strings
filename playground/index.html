<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM String Builder</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg-deep: #06060c;
        --bg-surface: #0d0d18;
        --bg-raised: #131320;
        --bg-input: #16162a;
        --border: rgba(255, 255, 255, 0.06);
        --border-hover: rgba(255, 255, 255, 0.12);
        --border-focus: rgba(99, 102, 241, 0.5);
        --text-primary: #e2e8f0;
        --text-secondary: #94a3b8;
        --text-muted: #4a5568;
        --syn-protocol: #64748b;
        --syn-label: #22d3ee;
        --syn-apikey: #f87171;
        --syn-sep: #475569;
        --syn-host: #818cf8;
        --syn-model: #34d399;
        --syn-param-name: #c084fc;
        --syn-param-value: #fbbf24;
        --success: #34d399;
        --warning: #fbbf24;
        --error: #f87171;
        --accent: #6366f1;
        --radius: 12px;
      }
      html {
        font-family: "Lexend", sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
      }
      body {
        min-height: 100vh;
        background:
          radial-gradient(ellipse at 50% -20%, rgba(99, 102, 241, 0.07) 0%, transparent 60%),
          radial-gradient(ellipse at 80% 60%, rgba(52, 211, 153, 0.03) 0%, transparent 40%),
          var(--bg-deep);
      }
      .app {
        max-width: 700px;
        margin: 0 auto;
        padding: 40px 20px 120px;
      }
      .header {
        text-align: center;
        margin-bottom: 36px;
      }
      .header h1 {
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(135deg, #818cf8, #34d399);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.5px;
      }
      .header .sub {
        font-size: 14px;
        color: var(--text-muted);
        margin-top: 4px;
        font-weight: 300;
      }

      /* ── Cards ── */
      .card {
        background: rgba(255, 255, 255, 0.015);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 16px;
        transition: border-color 0.2s;
        position: relative;
      }
      .card:hover {
        border-color: var(--border-hover);
      }
      .card-title {
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--text-secondary);
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .card-opt {
        font-size: 10px;
        font-weight: 400;
        text-transform: none;
        letter-spacing: 0;
        color: var(--text-muted);
        background: rgba(255, 255, 255, 0.04);
        padding: 2px 8px;
        border-radius: 20px;
      }

      /* ── Provider grid ── */
      .provider-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-bottom: 20px;
      }
      .provider-tile {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 12px 6px 10px;
        border-radius: 12px;
        border: 1.5px solid var(--border);
        background: rgba(255, 255, 255, 0.015);
        cursor: pointer;
        transition:
          border-color 0.22s ease,
          background 0.22s ease,
          transform 0.18s ease,
          box-shadow 0.22s ease;
        user-select: none;
        font-family: "Lexend", sans-serif;
      }
      .provider-tile:hover {
        border-color: var(--border-hover);
        background: rgba(255, 255, 255, 0.04);
        transform: translateY(-2px);
      }
      .provider-tile.selected {
        transform: translateY(-2px);
      }
      .provider-tile-name {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.3px;
        color: var(--text-muted);
        transition: color 0.2s;
        white-space: nowrap;
      }
      .provider-tile.selected .provider-tile-name {
        color: var(--text-primary);
      }
      .provider-tile-icon {
        transition: transform 0.18s ease;
      }
      .provider-tile.selected .provider-tile-icon {
        transform: scale(1.1);
      }

      /* ── Form layout ── */
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .form-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .form-field.full {
        grid-column: 1 / -1;
      }
      .field-label {
        font-size: 12px;
        font-weight: 500;
        color: var(--text-secondary);
      }

      /* ── Inputs ── */
      .input {
        width: 100%;
        padding: 10px 14px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text-primary);
        font-family: "Lexend", sans-serif;
        font-size: 14px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .input:focus {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
      }
      .input::placeholder {
        color: var(--text-muted);
      }
      .input[type="number"] {
        -moz-appearance: textfield;
      }
      .input[type="number"]::-webkit-inner-spin-button,
      .input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
      }
      select.input {
        cursor: pointer;
        appearance: none;
        background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 4l4 4 4-4' fill='none' stroke='%2364748b' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 12px center;
        padding-right: 32px;
      }

      /* ── API Key ── */
      .apikey-wrap {
        position: relative;
      }
      .apikey-wrap .input {
        padding-right: 42px;
      }
      .apikey-toggle {
        position: absolute;
        right: 1px;
        top: 1px;
        bottom: 1px;
        width: 38px;
        background: transparent;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 0 var(--radius) var(--radius) 0;
        transition: color 0.2s;
      }
      .apikey-toggle:hover {
        color: var(--text-secondary);
      }

      /* ── Combobox ── */
      .combobox {
        position: relative;
      }
      .combobox-wrap {
        position: relative;
      }
      .combobox-wrap .input {
        padding-right: 32px;
      }
      .combobox-chev {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        color: var(--text-muted);
        transition: transform 0.2s;
      }
      .combobox-chev.open {
        transform: translateY(-50%) rotate(180deg);
      }
      .combobox-dd {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background: var(--bg-raised);
        border: 1px solid var(--border-hover);
        border-radius: var(--radius);
        padding: 4px;
        z-index: 9999;
        max-height: 240px;
        overflow-y: auto;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        animation: ddIn 0.15s ease-out;
      }
      @keyframes ddIn {
        from { opacity: 0; transform: translateY(-4px); }
        to { opacity: 1; transform: none; }
      }
      .combobox-dd::-webkit-scrollbar { width: 6px; }
      .combobox-dd::-webkit-scrollbar-track { background: transparent; }
      .combobox-dd::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 3px;
      }
      .cb-opt {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.1s;
      }
      .cb-opt:hover,
      .cb-opt.hl {
        background: rgba(255, 255, 255, 0.05);
      }
      .cb-opt-icon {
        flex-shrink: 0;
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cb-opt-label {
        font-size: 14px;
        font-weight: 500;
        color: var(--text-primary);
      }
      .cb-opt-sub {
        font-size: 11px;
        color: var(--text-muted);
        margin-left: auto;
        font-family: "JetBrains Mono", monospace;
      }

      /* ── Toggle ── */
      .toggle {
        width: 48px;
        height: 26px;
        border-radius: 13px;
        border: 1px solid var(--border);
        background: var(--bg-input);
        position: relative;
        cursor: pointer;
        transition: background 0.25s;
        flex-shrink: 0;
      }
      .toggle.on {
        background: rgba(52, 211, 153, 0.2);
        border-color: rgba(52, 211, 153, 0.4);
      }
      .toggle-thumb {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--text-muted);
        transition: transform 0.25s, background 0.25s;
      }
      .toggle.on .toggle-thumb {
        transform: translateX(22px);
        background: var(--success);
      }

      /* ── Param rows ── */
      .param-row {
        display: grid;
        grid-template-columns: 140px 1fr auto auto;
        align-items: center;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        animation: paramIn 0.2s ease-out;
      }
      @keyframes paramIn {
        from { opacity: 0; transform: translateY(-6px) scale(0.98); }
        to { opacity: 1; transform: none; }
      }
      .param-row:last-of-type {
        border-bottom: none;
      }
      .param-name {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        color: var(--syn-param-name);
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .param-input {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .param-input .input {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
      }
      .param-issue {
        font-size: 14px;
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        flex-shrink: 0;
        cursor: help;
      }
      .param-issue.error { color: var(--error); }
      .param-issue.warn { color: var(--warning); }
      .param-remove {
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: 1px solid transparent;
        color: var(--text-muted);
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.15s;
        flex-shrink: 0;
      }
      .param-remove:hover {
        background: rgba(248, 113, 113, 0.1);
        border-color: rgba(248, 113, 113, 0.2);
        color: var(--error);
      }

      /* ── Number input with slider ── */
      .num-group {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
      }
      .num-group .input {
        width: 80px;
        text-align: center;
        flex-shrink: 0;
      }
      .slider-wrap {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 80px;
      }
      .slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        background: var(--bg-input);
        border-radius: 2px;
        outline: none;
      }
      .slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        border: 2px solid var(--bg-surface);
        box-shadow: 0 0 8px rgba(99, 102, 241, 0.3);
      }
      .slider::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        border: 2px solid var(--bg-surface);
      }
      .slider-labels {
        display: flex;
        justify-content: space-between;
        font-size: 9px;
        color: var(--text-muted);
        font-family: "JetBrains Mono", monospace;
      }

      /* ── Ghost param chips ── */
      .ghost-section {
        border-top: 1px solid rgba(255, 255, 255, 0.04);
        padding-top: 16px;
        margin-top: 4px;
      }
      .params-have-active .ghost-section {
        margin-top: 12px;
      }
      .ghost-section-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--text-muted);
        margin-bottom: 10px;
      }
      .ghost-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .ghost-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 10px 5px 6px;
        border: 1px dashed rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: transparent;
        cursor: pointer;
        transition: all 0.18s ease;
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
        font-weight: 500;
        color: var(--text-muted);
      }
      .ghost-chip:hover {
        border-color: rgba(192, 132, 252, 0.35);
        border-style: solid;
        color: var(--syn-param-name);
        background: rgba(192, 132, 252, 0.07);
        transform: translateY(-1px);
      }
      .ghost-chip-plus {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 1.2px solid currentColor;
        flex-shrink: 0;
        opacity: 0.6;
        transition: all 0.15s;
      }
      .ghost-chip:hover .ghost-chip-plus {
        opacity: 1;
        background: var(--syn-param-name);
        border-color: var(--syn-param-name);
        color: var(--bg-deep);
      }
      .ghost-chip-def {
        opacity: 0.35;
        font-size: 10px;
        font-weight: 400;
      }
      .params-no-provider {
        font-size: 13px;
        color: var(--text-muted);
        text-align: center;
        padding: 20px 0;
        border: 1px dashed rgba(255, 255, 255, 0.05);
        border-radius: var(--radius);
      }
      .params-hint {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      /* ── Import ── */
      .import-row {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        gap: 8px;
      }
      .import-btn {
        background: transparent;
        border: none;
        color: var(--text-muted);
        font-size: 12px;
        font-family: "Lexend", sans-serif;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
        transition: color 0.2s;
      }
      .import-btn:hover {
        color: var(--text-secondary);
      }
      .import-input {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        animation: ddIn 0.15s ease-out;
        flex: 1;
        max-width: 400px;
      }

      /* ── Floating preview bar ── */
      .float-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 200;
        background: rgba(6, 6, 12, 0.9);
        backdrop-filter: blur(24px) saturate(180%);
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        transition: border-top-color 0.4s ease;
      }
      .float-bar-accent {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
      }
      .float-bar-accent.visible {
        opacity: 1;
      }
      .float-bar-inner {
        max-width: 700px;
        margin: 0 auto;
        padding: 10px 20px 14px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .float-bar-label {
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--text-muted);
        flex-shrink: 0;
      }
      .float-bar-code {
        flex: 1;
        min-width: 0;
        cursor: pointer;
        overflow: hidden;
      }
      .float-bar-code .preview-code {
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 12.5px;
        line-height: 1.5;
      }
      .float-bar-actions {
        display: flex;
        align-items: center;
        gap: 7px;
        flex-shrink: 0;
      }
      .copy-btn {
        padding: 5px 13px;
        border-radius: 8px;
        background: rgba(99, 102, 241, 0.14);
        border: 1px solid rgba(99, 102, 241, 0.22);
        color: var(--accent);
        font-family: "Lexend", sans-serif;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.18s;
        white-space: nowrap;
      }
      .copy-btn:hover {
        background: rgba(99, 102, 241, 0.24);
        border-color: rgba(99, 102, 241, 0.4);
      }
      .copy-btn.copied {
        background: rgba(52, 211, 153, 0.14);
        border-color: rgba(52, 211, 153, 0.3);
        color: var(--success);
      }

      /* ── Badge ── */
      .badge {
        font-size: 11px;
        font-weight: 500;
        padding: 3px 10px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .badge-ok {
        background: rgba(52, 211, 153, 0.12);
        color: var(--success);
      }
      .badge-err {
        background: rgba(248, 113, 113, 0.12);
        color: var(--error);
      }
      .badge-warn {
        background: rgba(251, 191, 36, 0.12);
        color: var(--warning);
      }

      /* ── Syntax colors (shared between float bar and anywhere else) ── */
      .preview-code {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        line-height: 1.6;
        word-break: break-all;
      }
      .syn-protocol { color: var(--syn-protocol); }
      .syn-label { color: var(--syn-label); }
      .syn-apikey { color: var(--syn-apikey); cursor: pointer; }
      .syn-apikey:hover { text-decoration: underline; }
      .syn-sep { color: var(--syn-sep); }
      .syn-host { color: var(--syn-host); }
      .syn-model { color: var(--syn-model); }
      .syn-param-name { color: var(--syn-param-name); }
      .syn-param-value { color: var(--syn-param-value); }
      .syn-placeholder { color: var(--text-muted); font-style: italic; }

      /* ── Segment flash animation ── */
      @keyframes segFlash {
        0%, 15% { filter: brightness(2.2) saturate(1.5); }
        100%     { filter: brightness(1) saturate(1); }
      }
      .seg-flash {
        animation: segFlash 0.55s ease-out;
        display: inline;
      }

      /* ── Responsive ── */
      @media (max-width: 560px) {
        .provider-grid {
          grid-template-columns: repeat(4, 1fr);
          gap: 5px;
        }
        .provider-tile {
          padding: 8px 4px 7px;
        }
        .provider-tile-name {
          font-size: 9px;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
        .param-row {
          grid-template-columns: 100px 1fr auto auto;
          gap: 8px;
        }
        .app {
          padding: 24px 14px 110px;
        }
        .float-bar-code .preview-code {
          font-size: 11px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useState, useEffect, useMemo, useRef, useCallback } = React;

      // ═══════════════════════════════════════════════
      // DATA
      // ═══════════════════════════════════════════════

      const PROVIDERS = [
        { id: "openai",     name: "OpenAI",     host: "api.openai.com",                           color: "#10a37f" },
        { id: "anthropic",  name: "Anthropic",  host: "api.anthropic.com",                        color: "#e8956a" },
        { id: "google",     name: "Google",     host: "generativelanguage.googleapis.com",         color: "#4285f4" },
        { id: "mistral",    name: "Mistral",    host: "api.mistral.ai",                           color: "#ff7000" },
        { id: "cohere",     name: "Cohere",     host: "api.cohere.com",                           color: "#39d4a5" },
        { id: "bedrock",    name: "Bedrock",    host: "bedrock-runtime.us-east-1.amazonaws.com",  color: "#ff9900" },
        { id: "openrouter", name: "OpenRouter", host: "openrouter.ai",                            color: "#818cf8" },
        { id: "vercel",     name: "Vercel",     host: "gateway.ai.vercel.app",                    color: "#a0a0b0" },
      ];

      function hexToRgba(hex, alpha) {
        hex = hex.replace("#", "");
        if (hex.length === 3) hex = hex.split("").map(c => c + c).join("");
        const r = parseInt(hex.slice(0, 2), 16);
        const g = parseInt(hex.slice(2, 4), 16);
        const b = parseInt(hex.slice(4, 6), 16);
        return `rgba(${r},${g},${b},${alpha})`;
      }

      function detectProviderFromHost(host) {
        if (!host) return null;
        const h = host.toLowerCase();
        if (h.includes("openrouter")) return "openrouter";
        if (h.includes("gateway.ai.vercel")) return "vercel";
        if (h.includes("amazonaws") || h.includes("bedrock")) return "bedrock";
        if (h.includes("openai")) return "openai";
        if (h.includes("anthropic") || h.includes("claude")) return "anthropic";
        if (h.includes("googleapis") || h.includes("google")) return "google";
        if (h.includes("mistral")) return "mistral";
        if (h.includes("cohere")) return "cohere";
        return null;
      }

      function isReasoningModel(model) {
        const m = (model || "").replace(/^.*\//, "");
        return /^o[134]/.test(m);
      }

      function validateConfig(provider, model, params) {
        const issues = [];
        const specs = PARAM_SPECS[provider];
        if (!specs) return issues;

        for (const [name, value] of Object.entries(params)) {
          const spec = specs[name];
          if (!spec) {
            issues.push({ param: name, severity: "warning", message: "Unknown parameter for this provider" });
            continue;
          }
          if (spec.type === "number") {
            const str = String(value).trim();
            if (str === "") continue;
            const num = parseFloat(str);
            if (isNaN(num)) {
              issues.push({ param: name, severity: "error", message: "Must be a valid number" });
            } else {
              if (spec.min !== undefined && num < spec.min)
                issues.push({ param: name, severity: "error", message: `Minimum value is ${spec.min}` });
              if (spec.max !== undefined && num > spec.max)
                issues.push({ param: name, severity: "error", message: `Maximum value is ${spec.max}` });
            }
          }
          if (spec.type === "enum" && spec.values && value !== "") {
            if (!spec.values.includes(String(value)))
              issues.push({ param: name, severity: "error", message: `Must be one of: ${spec.values.join(", ")}` });
          }
        }

        if ((provider === "anthropic" || provider === "bedrock") &&
            params.temperature !== undefined && params.top_p !== undefined) {
          issues.push({ param: "top_p", severity: "warning", message: "Cannot use both temperature and top_p" });
        }

        if (model && isReasoningModel(model) && ["openai","openrouter","vercel"].includes(provider)) {
          for (const p of ["temperature","top_p","frequency_penalty","presence_penalty","n"]) {
            if (params[p] !== undefined)
              issues.push({ param: p, severity: "error", message: `Not supported for reasoning model "${model}". Use effort instead.` });
          }
        }

        return issues;
      }

      // ═══════════════════════════════════════════════
      // COMBOBOX
      // ═══════════════════════════════════════════════

      function Combobox({ value, onChange, options, placeholder }) {
        const [text, setText] = useState(value || "");
        const [open, setOpen] = useState(false);
        const [editing, setEditing] = useState(false);
        const [hl, setHl] = useState(0);
        const ref = useRef(null);
        const inputRef = useRef(null);

        useEffect(() => {
          if (!open) setText(value || "");
        }, [value]);

        const filtered = useMemo(() => {
          if (!editing || !text) return options;
          const q = text.toLowerCase();
          return options.filter(o =>
            o.label.toLowerCase().includes(q) ||
            o.value.toLowerCase().includes(q) ||
            (o.sublabel || "").toLowerCase().includes(q)
          );
        }, [text, editing, options]);

        useEffect(() => { setHl(0); }, [filtered.length]);

        useEffect(() => {
          const handle = (e) => {
            if (ref.current && !ref.current.contains(e.target)) {
              setOpen(false);
              setEditing(false);
            }
          };
          document.addEventListener("mousedown", handle);
          return () => document.removeEventListener("mousedown", handle);
        }, []);

        function select(opt) {
          setText(opt.label);
          onChange(opt.value, opt);
          setOpen(false);
          setEditing(false);
        }

        function handleKey(e) {
          if (!open && (e.key === "ArrowDown" || e.key === "Enter")) {
            setOpen(true); e.preventDefault(); return;
          }
          if (!open) return;
          switch (e.key) {
            case "ArrowDown": e.preventDefault(); setHl(i => Math.min(i + 1, filtered.length - 1)); break;
            case "ArrowUp":   e.preventDefault(); setHl(i => Math.max(i - 1, 0)); break;
            case "Enter":
              e.preventDefault();
              if (filtered[hl]) select(filtered[hl]);
              else if (text) { onChange(text); setOpen(false); setEditing(false); }
              break;
            case "Escape":
              setOpen(false); setText(value || ""); setEditing(false); break;
          }
        }

        return (
          <div ref={ref} className="combobox">
            <div className="combobox-wrap">
              <input
                ref={inputRef}
                className="input"
                value={text}
                placeholder={placeholder}
                autoComplete="off"
                onFocus={() => { setOpen(true); setEditing(false); inputRef.current?.select(); }}
                onChange={e => { setText(e.target.value); setEditing(true); setOpen(true); }}
                onKeyDown={handleKey}
              />
              <svg className={`combobox-chev${open ? " open" : ""}`} viewBox="0 0 12 12" width="12" height="12">
                <path d="M2 4l4 4 4-4" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
            </div>
            {open && filtered.length > 0 && (
              <div className="combobox-dd">
                {filtered.map((o, i) => (
                  <div
                    key={o.value}
                    className={`cb-opt${i === hl ? " hl" : ""}`}
                    onMouseEnter={() => setHl(i)}
                    onMouseDown={e => { e.preventDefault(); select(o); }}
                  >
                    {o.icon && <span className="cb-opt-icon">{o.icon}</span>}
                    <span className="cb-opt-label">{o.label}</span>
                    {o.sublabel && <span className="cb-opt-sub">{o.sublabel}</span>}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      // ═══════════════════════════════════════════════

      function Toggle({ value, onChange }) {
        const on = value === true || value === "true";
        return (
          <button className={`toggle${on ? " on" : ""}`} onClick={() => onChange(!on)} type="button" role="switch" aria-checked={on}>
            <span className="toggle-thumb" />
          </button>
        );
      }

      // ═══════════════════════════════════════════════
      // NUMBER INPUT WITH SLIDER
      // ═══════════════════════════════════════════════

      function NumberInput({ spec, value, onChange }) {
        const hasRange = spec.min !== undefined && spec.max !== undefined;
        const step = hasRange && spec.max - spec.min <= 4 ? 0.01 : 1;
        return (
          <div className="num-group">
            {hasRange && (
              <div className="slider-wrap">
                <input
                  type="range" className="slider"
                  min={spec.min} max={spec.max} step={step}
                  value={value === "" ? spec.min : value}
                  onChange={e => onChange(parseFloat(e.target.value))}
                />
                <div className="slider-labels">
                  <span>{spec.min}</span><span>{spec.max}</span>
                </div>
              </div>
            )}
            <input
              type="number" className="input"
              min={spec.min} max={spec.max} step={step} value={value}
              onChange={e => onChange(e.target.value)}
              placeholder={spec.min !== undefined ? `min ${spec.min}` : ""}
              style={{ width: hasRange ? 80 : 120 }}
            />
          </div>
        );
      }

      // ═══════════════════════════════════════════════
      // PARAM ROW
      // ═══════════════════════════════════════════════

      function ParamRow({ name, spec, value, onChange, onRemove, issue }) {
        let input;
        switch (spec.type) {
          case "number":
            input = <NumberInput spec={spec} value={value} onChange={onChange} />;
            break;
          case "boolean":
            input = <Toggle value={value} onChange={onChange} />;
            break;
          case "enum":
            input = (
              <select className="input" value={value} onChange={e => onChange(e.target.value)} style={{ width: "auto", minWidth: 100 }}>
                {(spec.values || []).map(v => <option key={v} value={v}>{v}</option>)}
              </select>
            );
            break;
          default:
            input = (
              <input className="input" type="text" value={value} onChange={e => onChange(e.target.value)} placeholder="value" style={{ width: "100%" }}/>
            );
        }

        return (
          <div className="param-row">
            <div className="param-name"><code>{name}</code></div>
            <div className="param-input">{input}</div>
            {issue ? (
              <div className={`param-issue ${issue.severity === "error" ? "error" : "warn"}`} title={issue.message}>
                {issue.severity === "error" ? (
                  <svg width="16" height="16" viewBox="0 0 16 16">
                    <circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" strokeWidth="1.5"/>
                    <path d="M5.5 5.5l5 5M10.5 5.5l-5 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
                  </svg>
                ) : (
                  <svg width="16" height="16" viewBox="0 0 16 16">
                    <path d="M8 1.5l7 13H1l7-13z" fill="none" stroke="currentColor" strokeWidth="1.3" strokeLinejoin="round"/>
                    <path d="M8 6v3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
                    <circle cx="8" cy="12" r="0.8" fill="currentColor"/>
                  </svg>
                )}
              </div>
            ) : (
              <div style={{ width: 22 }} />
            )}
            <button className="param-remove" onClick={onRemove} title="Remove">
              <svg width="12" height="12" viewBox="0 0 12 12">
                <path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
            </button>
          </div>
        );
      }

      // ═══════════════════════════════════════════════
      // GHOST CHIPS
      // ═══════════════════════════════════════════════

      function GhostChips({ specs, activeNames, onActivate }) {
        const available = Object.keys(specs).filter(k => !activeNames.includes(k));
        if (available.length === 0) return null;

        return (
          <div className="ghost-section">
            {activeNames.length > 0 && (
              <div className="ghost-section-label">Add parameter</div>
            )}
            <div className="ghost-chips">
              {available.map(name => {
                const spec = specs[name];
                const def = spec.def;
                const showDef = def !== undefined && def !== "" && def !== false;
                return (
                  <button
                    key={name}
                    type="button"
                    className="ghost-chip"
                    onClick={() => onActivate(name, def)}
                    title={spec.desc}
                  >
                    <span className="ghost-chip-plus">
                      <svg width="7" height="7" viewBox="0 0 7 7">
                        <path d="M3.5 1v5M1 3.5h5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
                      </svg>
                    </span>
                    <span>{name}</span>
                    {showDef && <span className="ghost-chip-def">{String(def)}</span>}
                  </button>
                );
              })}
            </div>
          </div>
        );
      }

      // ═══════════════════════════════════════════════
      // FLOATING URL BAR
      // ═══════════════════════════════════════════════

      function FloatBar({ label, apiKey, host, model, params, issues, providerColor }) {
        const [copied, setCopied] = useState(false);
        const [showKey, setShowKey] = useState(false);

        const plain = useMemo(() => {
          let s = "llm://";
          if (label) {
            s += encodeURIComponent(label);
            if (apiKey) s += ":" + encodeURIComponent(apiKey);
            s += "@";
          }
          s += host || "provider";
          s += "/" + (model || "model");
          const entries = Object.entries(params).filter(([_, v]) => v !== "" && v !== undefined && v !== null);
          if (entries.length)
            s += "?" + entries.map(([k, v]) => `${k}=${encodeURIComponent(String(v))}`).join("&");
          return s;
        }, [label, apiKey, host, model, params]);

        // Build segments — key includes value so changed segments re-mount and flash
        const segs = [];
        segs.push({ id: "proto",   t: "llm://", c: "protocol" });
        if (label) {
          segs.push({ id: `lbl_${label}`,       t: label, c: "label" });
          if (apiKey) {
            segs.push({ id: "sep_c",             t: ":", c: "sep" });
            const display = showKey ? apiKey : "•".repeat(Math.min(apiKey.length, 10));
            segs.push({ id: `key_${showKey}`,    t: display, c: "apikey", click: () => setShowKey(x => !x) });
          }
          segs.push({ id: "sep_at",             t: "@", c: "sep" });
        }
        if (host) segs.push({ id: `host_${host}`, t: host, c: "host" });
        else      segs.push({ id: "host_ph",        t: "‹provider›", c: "placeholder" });

        segs.push({ id: "slash",  t: "/", c: "sep" });

        if (model) segs.push({ id: `mdl_${model}`, t: model, c: "model" });
        else       segs.push({ id: "mdl_ph",         t: "‹model›", c: "placeholder" });

        const entries = Object.entries(params).filter(([_, v]) => v !== "" && v !== undefined && v !== null);
        if (entries.length) {
          segs.push({ id: "q", t: "?", c: "sep" });
          entries.forEach(([k, v], i) => {
            if (i > 0) segs.push({ id: `amp_${i}`, t: "&", c: "sep" });
            segs.push({ id: `pn_${k}`,        t: k,        c: "param-name" });
            segs.push({ id: `pe_${k}`,        t: "=",      c: "sep" });
            segs.push({ id: `pv_${k}_${v}`,   t: String(v), c: "param-value" });
          });
        }

        const errs  = issues.filter(i => i.severity === "error").length;
        const warns = issues.filter(i => i.severity === "warning").length;
        const isValid = host && model && errs === 0 && warns === 0;

        async function handleCopy() {
          try { await navigator.clipboard.writeText(plain); } catch {}
          setCopied(true);
          setTimeout(() => setCopied(false), 1800);
        }

        return (
          <div className="float-bar">
            {providerColor && (
              <div
                className="float-bar-accent visible"
                style={{ background: `linear-gradient(90deg, ${hexToRgba(providerColor, 0.7)} 0%, ${hexToRgba(providerColor, 0.2)} 40%, transparent 70%)` }}
              />
            )}
            <div className="float-bar-inner">
              <div className="float-bar-label">LLM URL</div>
              <div className="float-bar-code" onClick={handleCopy} title="Click to copy">
                <code className="preview-code">
                  {segs.map(s => (
                    <span
                      key={s.id}
                      className={`syn-${s.c} seg-flash`}
                      onClick={s.click ? e => { e.stopPropagation(); s.click(); } : undefined}
                      style={s.click ? { cursor: "pointer" } : undefined}
                    >
                      {s.t}
                    </span>
                  ))}
                </code>
              </div>
              <div className="float-bar-actions">
                {isValid && <span className="badge badge-ok">✓ Valid</span>}
                {errs > 0  && <span className="badge badge-err">{errs} err{errs > 1 ? "s" : ""}</span>}
                {warns > 0 && <span className="badge badge-warn">{warns} warn{warns > 1 ? "s" : ""}</span>}
                <button className={`copy-btn${copied ? " copied" : ""}`} onClick={handleCopy}>
                  {copied ? "✓ Copied" : "Copy"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ═══════════════════════════════════════════════
      // MAIN APP
      // ═══════════════════════════════════════════════

      function App() {
        const [provider, setProvider] = useState(null);
        const [host, setHost] = useState("");
        const [model, setModel] = useState("");
        const [label, setLabel] = useState("");
        const [apiKey, setApiKey] = useState("");
        const [showApiKey, setShowApiKey] = useState(false);
        const [activeParams, setActiveParams] = useState({});
        const [showImport, setShowImport] = useState(false);
        const [importText, setImportText] = useState("");

        const currentProvider = provider || detectProviderFromHost(host);
        const specs = PARAM_SPECS[currentProvider] || {};

        const modelOpts = (MODELS[currentProvider] || []).map(m => ({ value: m, label: m }));

        const issues = useMemo(
          () => validateConfig(currentProvider, model, activeParams),
          [currentProvider, model, activeParams]
        );
        const issueMap = useMemo(() => {
          const m = {};
          issues.forEach(i => { if (!m[i.param]) m[i.param] = i; });
          return m;
        }, [issues]);

        const providerMeta = PROVIDERS.find(p => p.id === currentProvider);

        function handleProviderSelect(id) {
          const prov = PROVIDERS.find(p => p.id === id);
          if (!prov) return;
          setProvider(prov.id);
          setHost(prov.host);
          setModel("");
          setActiveParams(prev => {
            const newSpecs = PARAM_SPECS[prov.id] || {};
            const keep = {};
            for (const [k, v] of Object.entries(prev)) {
              if (newSpecs[k]) keep[k] = v;
            }
            return keep;
          });
        }

        function handleImport(text) {
          setImportText(text);
          try {
            const url = new URL(text);
            if (url.protocol !== "llm:") return;
            const h = url.hostname + (url.port ? ":" + url.port : "");
            setHost(h);
            setModel(decodeURIComponent(url.pathname.replace(/^\//, "")));
            setLabel(decodeURIComponent(url.username || ""));
            setApiKey(decodeURIComponent(url.password || ""));
            const p = {};
            url.searchParams.forEach((v, k) => { p[k] = v; });
            setActiveParams(p);
            const det = detectProviderFromHost(h);
            setProvider(det);
            setShowImport(false);
            setImportText("");
          } catch {}
        }

        const hasActiveParams = Object.keys(activeParams).length > 0;

        return (
          <div className="app">
            <header className="header">
              <h1>LLM String Builder</h1>
              <p className="sub">Configure and preview your LLM connection strings</p>
            </header>

            {/* Import */}
            <div className="import-row">
              {showImport ? (
                <>
                  <input
                    className="input import-input"
                    placeholder="Paste llm:// connection string..."
                    value={importText}
                    onChange={e => handleImport(e.target.value)}
                    autoFocus
                  />
                  <button className="import-btn" onClick={() => { setShowImport(false); setImportText(""); }}>
                    Cancel
                  </button>
                </>
              ) : (
                <button className="import-btn" onClick={() => setShowImport(true)}>
                  <svg width="12" height="12" viewBox="0 0 12 12" style={{ marginRight: 4, verticalAlign: -1 }}>
                    <path d="M6 1v8M2 5l4 4 4-4" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  Import existing string
                </button>
              )}
            </div>

            {/* Provider & Model */}
            <div
              className="card"
              style={providerMeta ? { borderTopColor: hexToRgba(providerMeta.color, 0.35) } : undefined}
            >
              <div className="card-title">
                {currentProvider && <ProviderIcon id={currentProvider} size={15} />}
                Provider &amp; Model
              </div>

              <ProviderGrid selected={currentProvider} onSelect={handleProviderSelect} />

              <div className="form-field">
                <label className="field-label">Model</label>
                <Combobox
                  value={model}
                  onChange={val => setModel(val)}
                  options={modelOpts}
                  placeholder={currentProvider ? "Select or type model…" : "Select a provider first"}
                />
              </div>

              {/* Show custom host if provider not recognized */}
              {host && !currentProvider && (
                <div style={{ marginTop: 12 }}>
                  <label className="field-label">Custom Host</label>
                  <input
                    className="input"
                    style={{ marginTop: 6, fontFamily: "'JetBrains Mono', monospace", fontSize: 13 }}
                    value={host}
                    onChange={e => { setHost(e.target.value); setProvider(null); }}
                    placeholder="hostname"
                  />
                </div>
              )}
            </div>

            {/* Identity */}
            <div className="card">
              <div className="card-title">
                Identity <span className="card-opt">optional</span>
              </div>
              <div className="form-row">
                <div className="form-field">
                  <label className="field-label">Label</label>
                  <input
                    className="input"
                    value={label}
                    onChange={e => setLabel(e.target.value)}
                    placeholder="App name"
                  />
                </div>
                <div className="form-field">
                  <label className="field-label">API Key</label>
                  <div className="apikey-wrap">
                    <input
                      className="input"
                      type={showApiKey ? "text" : "password"}
                      value={apiKey}
                      onChange={e => setApiKey(e.target.value)}
                      placeholder="sk-..."
                    />
                    <button className="apikey-toggle" onClick={() => setShowApiKey(!showApiKey)} type="button" title={showApiKey ? "Hide" : "Show"}>
                      {showApiKey ? (
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round">
                          <path d="M2 2l12 12"/>
                          <path d="M6.5 6.5a2.1 2.1 0 003 3"/>
                          <path d="M3.5 5.5C2.2 6.6 1.3 8 1.3 8s2.5 5 6.7 5c.8 0 1.6-.2 2.3-.5"/>
                          <path d="M12.5 10.5c1.3-1.1 2.2-2.5 2.2-2.5s-2.5-5-6.7-5c-.8 0-1.6.2-2.3.5"/>
                        </svg>
                      ) : (
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round">
                          <path d="M1.3 8s2.5-5 6.7-5 6.7 5 6.7 5-2.5 5-6.7 5S1.3 8 1.3 8z"/>
                          <circle cx="8" cy="8" r="2"/>
                        </svg>
                      )}
                    </button>
                  </div>
                </div>
              </div>
            </div>

            {/* Parameters */}
            <div className="card">
              <div className="card-title">Parameters</div>

              {!currentProvider ? (
                <div className="params-no-provider">
                  Select a provider to configure parameters
                </div>
              ) : (
                <div className={hasActiveParams ? "params-have-active" : ""}>
                  {Object.entries(activeParams).map(([name, value]) => (
                    <ParamRow
                      key={name}
                      name={name}
                      spec={specs[name] || { type: "string", def: "" }}
                      value={value}
                      onChange={v => setActiveParams(p => ({ ...p, [name]: v }))}
                      onRemove={() => setActiveParams(p => { const c = { ...p }; delete c[name]; return c; })}
                      issue={issueMap[name]}
                    />
                  ))}

                  <GhostChips
                    specs={specs}
                    activeNames={Object.keys(activeParams)}
                    onActivate={(name, def) => setActiveParams(p => ({ ...p, [name]: def }))}
                  />
                </div>
              )}
            </div>

            {/* Floating URL preview bar */}
            <FloatBar
              label={label}
              apiKey={apiKey}
              host={host}
              model={model}
              params={activeParams}
              issues={issues}
              providerColor={providerMeta?.color}
            />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
